name: Build Android APK (LPP)

on:
  push:
    branches:
      - main
      - master

jobs:
  build:
    name: Build LPP APK
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Source
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '21'

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install Dependencies
        run: npm ci

      - name: Build Next.js
        run: npm run build

      - name: Sync Capacitor
        run: npm run cap:sync

      - name: Build Android APK (Debug)
        working-directory: ./android
        run: |
          chmod +x gradlew
          ./gradlew assembleDebug

      - name: Rename APK
        run: |
          # Movemos y renombramos el archivo para que al descargarlo se llame LPP.apk
          mv android/app/build/outputs/apk/debug/app-debug.apk android/app/build/outputs/apk/debug/LPP.apk

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: LPP-App-Binary
          path: android/app/build/outputs/apk/debug/LPP.apk
