name: Build Android APK (LPP)

on:
  push:
    branches:
      - main
      - master

jobs:
  build:
    name: Build LPP APK
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Source
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '21'

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          # Eliminamos la línea de cache para evitar errores si no hay lockfile
          # cache: 'npm' 

      - name: Install Dependencies
        # Cambiamos 'npm ci' por 'npm install' para que sea menos estricto
        run: npm install

      - name: Build Next.js
        run: npm run build

      - name: Sync Capacitor
        run: npm run cap:sync

      - name: Build Android APK (Debug)
        working-directory: ./android
        run: |
          chmod +x gradlew
          ./gradlew assembleDebug

      - name: Rename APK
        run: |
          # Aseguramos que el nombre final sea LPP.apk
          mv android/app/build/outputs/apk/debug/app-debug.apk android/app/build/outputs/apk/debug/LPP.apk

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: LPP-App-Binary
          path: android/app/build/outputs/apk/debug/LPP.apk
